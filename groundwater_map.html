<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울시 유출지하수 구별 발생 현황 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #060a14;
    --panel: #0c1626;
    --panel2: #0f1f35;
    --border: #1a3050;
    --accent1: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --accent4: #c77dff;
    --accent5: #ffd166;
    --text: #e8f4fd;
    --text-dim: #6b8fa8;
    --text-mid: #a8c5da;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
    background-size:50px 50px;
    pointer-events:none; z-index:0;
  }
  .wrapper { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; }

  /* HEADER */
  header {
    padding:14px 28px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(0,212,255,0.05) 0%,transparent 100%);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .logo-mark {
    width:38px; height:38px;
    border:1.5px solid var(--accent1);
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:9px; color:var(--accent1);
    box-shadow:0 0 14px rgba(0,212,255,0.2); text-align:center; line-height:1.3;
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 14px rgba(0,212,255,0.2);}
    50%{box-shadow:0 0 24px rgba(0,212,255,0.4);}
  }
  .header-title h1 { font-size:16px; font-weight:700; }
  .header-title p { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; margin-top:2px; }
  .header-right { display:flex; align-items:center; gap:16px; }
  .live-badge { display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:10px; color:var(--accent2); }
  .live-dot { width:6px;height:6px;background:var(--accent2);border-radius:50%;box-shadow:0 0 6px var(--accent2);animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:.2;} }

  /* MODE TOGGLE */
  .mode-btns { display:flex; gap:0; background:var(--panel2); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
  .mode-btn {
    padding:6px 14px; font-size:11px; font-weight:500; cursor:pointer;
    color:var(--text-dim); transition:all .2s; white-space:nowrap;
  }
  .mode-btn.active { background:rgba(0,212,255,0.15); color:var(--accent1); }
  .mode-btn:hover:not(.active) { color:var(--text-mid); }

  /* BODY LAYOUT */
  .body { display:flex; flex:1; overflow:hidden; }

  /* LEFT SIDEBAR */
  .sidebar {
    width:300px; flex-shrink:0;
    border-right:1px solid var(--border);
    overflow-y:auto; overflow-x:hidden;
    padding:16px;
    display:flex; flex-direction:column; gap:12px;
  }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-track { background:transparent; }
  .sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .sidebar-section-title {
    font-size:10px; font-weight:600; letter-spacing:0.8px;
    color:var(--text-dim); text-transform:uppercase;
    font-family:'Space Mono',monospace;
    padding-bottom:8px; border-bottom:1px solid var(--border);
  }

  /* FILTER PILLS */
  .filter-pills { display:flex; flex-wrap:wrap; gap:6px; }
  .pill {
    padding:4px 11px; border-radius:20px; font-size:11px; font-weight:500;
    cursor:pointer; transition:all .2s; border:1px solid transparent;
    user-select:none;
  }
  .pill-subway { background:rgba(153,51,204,.15); color:#c77dff; border-color:rgba(153,51,204,.3); }
  .pill-building { background:rgba(0,255,157,.1); color:#00ff9d; border-color:rgba(0,255,157,.2); }
  .pill-cable { background:rgba(0,212,255,.1); color:#00d4ff; border-color:rgba(0,212,255,.2); }
  .pill-elec { background:rgba(255,107,53,.1); color:#ff6b35; border-color:rgba(255,107,53,.2); }
  .pill-total { background:rgba(255,209,102,.12); color:#ffd166; border-color:rgba(255,209,102,.25); }
  .pill.inactive { opacity:.35; filter:grayscale(.7); }
  .pill:hover { transform:scale(1.05); }

  /* LEGEND */
  .legend-bar {
    height:12px; border-radius:6px;
    background:linear-gradient(90deg,#0a1a2e,#0d3a5e,#0e5c8a,#0d7db5,#00a8e8,#00d4ff,#7fffff);
    margin:6px 0;
  }
  .legend-labels { display:flex; justify-content:space-between; font-family:'Space Mono',monospace; font-size:9px; color:var(--text-dim); }

  /* RANKING LIST */
  .rank-list { display:flex; flex-direction:column; gap:0; }
  .rank-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 6px; border-bottom:1px solid rgba(26,48,80,.4);
    cursor:pointer; transition:background .15s; border-radius:4px;
  }
  .rank-item:hover { background:rgba(0,212,255,.05); }
  .rank-item.selected { background:rgba(0,212,255,.1); }
  .rank-num {
    font-family:'Space Mono',monospace; font-size:10px; font-weight:700;
    width:18px; text-align:center; flex-shrink:0;
  }
  .rank-name { font-size:12px; flex:1; }
  .rank-bar-wrap { width:60px; flex-shrink:0; }
  .rank-bar { height:3px; border-radius:2px; margin-bottom:3px; }
  .rank-val { font-family:'Space Mono',monospace; font-size:9px; color:var(--text-dim); text-align:right; }

  /* TOOLTIP PANEL */
  .detail-panel {
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:14px; display:none;
  }
  .detail-panel.show { display:block; }
  .detail-gu-name { font-size:16px; font-weight:700; margin-bottom:10px; }
  .detail-total { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; color:var(--accent1); margin-bottom:12px; }
  .detail-total span { font-size:11px; color:var(--text-dim); }
  .detail-rows { display:flex; flex-direction:column; gap:6px; }
  .detail-row { display:flex; align-items:center; gap:8px; }
  .detail-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
  .detail-label { font-size:11px; color:var(--text-mid); flex:1; }
  .detail-val { font-family:'Space Mono',monospace; font-size:11px; font-weight:600; }
  .detail-mini-bar { height:3px; border-radius:2px; margin-top:2px; }

  .chart-mini { margin-top:12px; height:80px; position:relative; }

  /* MAP AREA */
  .map-area { flex:1; position:relative; overflow:hidden; }
  #map-svg-wrap {
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  /* SVG MAP STYLES */
  .gu-path {
    stroke:#1a3050;
    stroke-width:1.5;
    cursor:pointer;
    transition:filter .2s, stroke .2s, stroke-width .2s;
  }
  .gu-path:hover {
    stroke:#00d4ff !important;
    stroke-width:2.5 !important;
    filter:brightness(1.4) drop-shadow(0 0 8px rgba(0,212,255,.5)) !important;
  }
  .gu-path.selected {
    stroke:#ffd166 !important;
    stroke-width:2.5 !important;
    filter:brightness(1.3) drop-shadow(0 0 10px rgba(255,209,102,.5)) !important;
  }

  /* GU LABEL */
  .gu-label {
    font-family:'Noto Sans KR',sans-serif;
    font-size:9.5px;
    font-weight:600;
    fill:#e8f4fd;
    pointer-events:none;
    text-anchor:middle;
    dominant-baseline:middle;
    text-shadow:0 1px 3px rgba(0,0,0,.8);
    paint-order:stroke;
    stroke:#060a14;
    stroke-width:2.5px;
  }

  /* BUBBLE OVERLAY */
  .bubble-circle {
    opacity:.75;
    cursor:pointer;
    transition:opacity .2s, r .2s;
  }
  .bubble-circle:hover { opacity:1; }

  /* TOOLTIP */
  #map-tooltip {
    position:absolute; pointer-events:none;
    background:rgba(10,20,36,.95); border:1px solid var(--accent1);
    border-radius:8px; padding:12px 14px; z-index:100;
    font-size:12px; min-width:200px;
    box-shadow:0 4px 24px rgba(0,212,255,.2);
    display:none;
  }
  #map-tooltip .tt-name { font-size:14px; font-weight:700; margin-bottom:8px; }
  #map-tooltip .tt-total { font-family:'Space Mono',monospace; font-size:16px; color:var(--accent1); font-weight:700; margin-bottom:8px; }
  #map-tooltip .tt-row { display:flex; justify-content:space-between; gap:12px; margin-bottom:3px; font-size:11px; }
  #map-tooltip .tt-label { color:var(--text-mid); }
  #map-tooltip .tt-val { font-family:'Space Mono',monospace; font-weight:600; color:var(--text); }

  /* SCALE BAR */
  .map-overlays {
    position:absolute; bottom:16px; right:16px;
    display:flex; flex-direction:column; align-items:flex-end; gap:8px;
  }
  .compass {
    width:36px;height:36px;
    background:rgba(10,20,36,.8); border:1px solid var(--border);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--accent1);
    font-family:'Space Mono',monospace;
  }
  .scale-note {
    background:rgba(10,20,36,.8); border:1px solid var(--border);
    border-radius:5px; padding:4px 10px;
    font-family:'Space Mono',monospace; font-size:9px; color:var(--text-dim);
  }

  /* STACKED BAR TICKS */
  .map-title-overlay {
    position:absolute; top:14px; left:14px;
    background:rgba(6,10,20,.85); border:1px solid var(--border);
    border-radius:7px; padding:10px 14px;
  }
  .mto-label { font-size:11px; font-weight:600; color:var(--text-mid); margin-bottom:4px; }
  .mto-mode { font-size:10px; font-family:'Space Mono',monospace; color:var(--accent1); }

  /* TOP BAR CHART ON MAP */
  .map-rank-overlay {
    position:absolute; top:14px; right:14px;
    background:rgba(6,10,20,.88); border:1px solid var(--border);
    border-radius:7px; padding:10px 14px; width:200px;
  }
  .mro-title { font-size:10px; color:var(--text-dim); font-family:'Space Mono',monospace; margin-bottom:8px; }
  .mro-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
  .mro-name { font-size:10px; width:48px; flex-shrink:0; color:var(--text-mid); }
  .mro-bar { height:5px; border-radius:3px; flex:1; }
  .mro-val { font-family:'Space Mono',monospace; font-size:9px; color:var(--text-dim); width:38px; text-align:right; }
</style>
</head>

        <div class="detail-row">

        <div style="padding-left:16px;margin-top:-4px;margin-bottom:2px">
          <div class="detail-mini-bar" id="dp-bar-elec" style="background:#ff6b35;width:0%"></div>
        </div>

      <div class="chart-mini">

    </div>

    <!-- Ranking -->
    <div>

      <div class="rank-list" id="rank-list"></div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-area">
    <div id="map-svg-wrap">
      <!-- SVG MAP INJECTED BY JS -->
      <svg id="seoul-map" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;max-height:100vh"></svg>

      <!-- Tooltip -->
      <div id="map-tooltip">
        <div class="tt-name" id="tt-name">—</div>
        <div class="tt-total" id="tt-total">—</div>
        <div class="tt-row"><span class="tt-label">🚇 지하철</span><span class="tt-val" id="tt-subway">—</span></div>

      <div class="map-overlays">
        <div class="compass">N</div>
        <div class="scale-note">서울시 25개 자치구</div>
      </div>
    </div>
  </div>

</div>
</div>

// Centroids for labels
const GU_CENTROIDS = {
  "도봉구":   [445, 60],  "노원구":   [563, 82],  "강북구":   [393, 100],
  "은평구":   [307, 127], "성북구":   [476, 130], "중랑구":   [557, 155],
  "서대문구": [284, 203], "종로구":   [381, 205], "동대문구": [508, 200],
  "마포구":   [255, 258], "중구":     [408, 254], "성동구":   [510, 267],
  "광진구":   [600, 283], "용산구":   [368, 313], "영등포구": [252, 344],
  "양천구":   [170, 357], "강서구":   [150, 295], "동작구":   [385, 383],
  "구로구":   [242, 413], "관악구":   [316, 422], "서초구":   [488, 368],
  "금천구":   [273, 484], "강남구":   [563, 375], "송파구":   [625, 375],
  "강동구":   [673, 305]
};

// =================== STATE ===================
let currentMode = 'total';
let selectedGu = null;
let detailChart = null;

// =================== COLOR SCALE ===================
function getColor(value, maxVal, mode) {
  if (value === 0) return '#0a1522';
  const t = Math.pow(value / maxVal, 0.55); // power scale for better contrast
  const palettes = {
    total:    [[6,10,20],[8,28,62],[12,72,130],[10,125,185],[0,168,232],[0,212,255],[120,255,245]],
    subway:   [[10,5,25],[45,10,100],[90,30,160],[140,60,200],[180,100,230],[199,119,255],[230,180,255]],
    building: [[5,20,10],[10,70,30],[10,120,60],[10,170,90],[0,200,120],[0,255,157],[140,255,210]],
    cable:    [[5,18,22],[8,55,80],[10,90,135],[10,130,185],[0,170,230],[0,212,255],[120,235,255]],
    elec:     [[22,8,4],[80,30,10],[140,55,15],[190,85,20],[230,110,30],[255,140,50],[255,200,130]]
  };
  const pal = palettes[mode] || palettes.total;
  const seg = Math.min(t * (pal.length - 1), pal.length - 1.001);
  const i = Math.floor(seg);
  const f = seg - i;
  const c1 = pal[i], c2 = pal[i+1];
  const r = Math.round(c1[0] + (c2[0]-c1[0])*f);
  const g = Math.round(c1[1] + (c2[1]-c1[1])*f);
  const b = Math.round(c1[2] + (c2[2]-c1[2])*f);
  return `rgb(${r},${g},${b})`;
}

function getVal(gu, mode) {
  const d = GU_DATA[gu];
  if (!d) return 0;
  return d[mode === 'total' ? 'total' : mode] || 0;
}

function getMaxVal(mode) {
  return Math.max(...Object.keys(GU_DATA).map(g => getVal(g, mode)));
}

// =================== RENDER MAP ===================
function renderMap() {
  const svg = document.getElementById('seoul-map');
  svg.innerHTML = '';
  const maxVal = getMaxVal(currentMode);

  // Add glow filter
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-strong"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  `;
  svg.appendChild(defs);

  // Draw paths
  Object.entries(GU_PATHS).forEach(([gu, pathD]) => {
    const val = getVal(gu, currentMode);
    const color = getColor(val, maxVal, currentMode);

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', pathD);
    path.setAttribute('fill', color);
    path.setAttribute('class', 'gu-path' + (selectedGu === gu ? ' selected' : ''));
    path.setAttribute('data-gu', gu);

    path.addEventListener('mousemove', (e) => showTooltip(e, gu));
    path.addEventListener('mouseleave', hideTooltip);
    path.addEventListener('click', () => selectGu(gu));

    svg.appendChild(path);
  });

  // Draw labels
  Object.entries(GU_CENTROIDS).forEach(([gu, [cx, cy]]) => {
    const val = getVal(gu, currentMode);
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', cx);
    text.setAttribute('y', cy);
    text.setAttribute('class','gu-label');
    text.setAttribute('font-size', gu.length > 3 ? '8.5' : '9.5');
    text.textContent = gu.replace('구','');
    svg.appendChild(text);

    // Value label (small)
    if (val > 0) {
      const vtext = document.createElementNS('http://www.w3.org/2000/svg','text');
      vtext.setAttribute('x', cx);
      vtext.setAttribute('y', cy + 12);
      vtext.setAttribute('text-anchor','middle');
      vtext.setAttribute('dominant-baseline','middle');
      vtext.setAttribute('font-family','Space Mono,monospace');
      vtext.setAttribute('font-size','7');
      vtext.setAttribute('fill','rgba(232,244,253,0.65)');
      vtext.setAttribute('paint-order','stroke');
      vtext.setAttribute('stroke','#060a14');
      vtext.setAttribute('stroke-width','2px');
      vtext.setAttribute('pointer-events','none');
      vtext.textContent = val >= 1000000 ? (val/1000000).toFixed(1)+'M' : val >= 1000 ? (val/1000).toFixed(0)+'K' : val;
      svg.appendChild(vtext);
    }
  });

  // Update legend
  updateLegend(maxVal);
  updateRanking();
  updateTopOverlay();
}

function updateLegend(maxVal) {
  document.getElementById('legend-max').textContent = maxVal >= 1000000 ? (maxVal/1000000).toFixed(1)+'M톤' : (maxVal/1000).toFixed(0)+'K톤';
  document.getElementById('legend-mid').textContent = maxVal >= 1000000 ? (maxVal/2000000).toFixed(1)+'M톤' : (maxVal/2000).toFixed(0)+'K톤';
}

function updateTopOverlay() {
  const sorted = Object.entries(GU_DATA).sort((a,b)=>getVal(b[0],currentMode)-getVal(a[0],currentMode)).slice(0,7);
  const top = sorted[0] ? getVal(sorted[0][0], currentMode) : 1;
  const modeColors = {total:'#00d4ff',subway:'#c77dff',building:'#00ff9d',cable:'#00d4ff',elec:'#ff6b35'};
  const col = modeColors[currentMode];
  document.getElementById('mro-rows').innerHTML = sorted.map(([gu,d]) => {
    const v = getVal(gu, currentMode);
    const pct = v / top * 100;
    const label = v >= 1000000 ? (v/1000000).toFixed(1)+'M' : (v/1000).toFixed(0)+'K';
    return `<div class="mro-row">
      <div class="mro-name">${gu}</div>
      <div class="mro-bar" style="background:${col};width:${pct}%;opacity:.7"></div>
      <div class="mro-val">${label}</div>
    </div>`;
  }).join('');

  const modeLabels = {total:'전체 합산', subway:'지하철', building:'건축물', cable:'통신구', elec:'전력구'};
  document.getElementById('mto-label').textContent = modeLabels[currentMode] + ' 유출지하수 발생량';
  document.getElementById('mto-mode').textContent = 'MODE: ' + currentMode.toUpperCase();
}

function updateRanking() {
  const sorted = Object.entries(GU_DATA).sort((a,b)=>getVal(b[0],currentMode)-getVal(a[0],currentMode));
  const top = getVal(sorted[0][0], currentMode);
  const modeColors = {total:'#00d4ff',subway:'#c77dff',building:'#00ff9d',cable:'#00d4ff',elec:'#ff6b35'};
  const col = modeColors[currentMode];

  const rankColors = ['#ffd166','#00d4ff','#00ff9d'];

  document.getElementById('rank-list').innerHTML = sorted.map(([gu,d], i) => {
    const v = getVal(gu, currentMode);
    const pct = v / top * 100;
    const label = v >= 1000000 ? (v/1000000).toFixed(2)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v;
    const numColor = i < 3 ? rankColors[i] : '#6b8fa8';
    return `<div class="rank-item${selectedGu===gu?' selected':''}" onclick="selectGu('${gu}')" data-gu="${gu}">
      <div class="rank-num" style="color:${numColor}">${i+1}</div>
      <div class="rank-name">${gu}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar" style="background:${col};width:${pct}%;opacity:.7"></div>
        <div class="rank-val">${label}</div>
      </div>
    </div>`;
  }).join('');
}

// =================== TOOLTIP ===================
function showTooltip(e, gu) {
  const d = GU_DATA[gu];
  if (!d) return;
  const tt = document.getElementById('map-tooltip');
  document.getElementById('tt-name').textContent = gu;
  document.getElementById('tt-total').textContent = d.total.toLocaleString() + ' 톤';
  document.getElementById('tt-subway').textContent = d.subway.toLocaleString() + ' 톤';
  document.getElementById('tt-building').textContent = d.building.toLocaleString() + ' 톤';
  document.getElementById('tt-cable').textContent = d.cable.toLocaleString() + ' 톤';
  document.getElementById('tt-elec').textContent = d.elec.toLocaleString() + ' 톤';
  tt.style.display = 'block';

  const wrap = document.getElementById('map-svg-wrap');
  const rect = wrap.getBoundingClientRect();
  let x = e.clientX - rect.left + 16;
  let y = e.clientY - rect.top - 20;
  if (x + 220 > rect.width) x = e.clientX - rect.left - 230;
  if (y + 160 > rect.height) y = e.clientY - rect.top - 180;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}
function hideTooltip() {
  document.getElementById('map-tooltip').style.display = 'none';
}

// =================== SELECT GU ===================
function selectGu(gu) {
  selectedGu = selectedGu === gu ? null : gu;
  renderMap();

  // Update ranking selection
  document.querySelectorAll('.rank-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.gu === selectedGu);
  });

  const dp = document.getElementById('detail-panel');
  if (!selectedGu) { dp.classList.remove('show'); return; }

  dp.classList.add('show');
  const d = GU_DATA[selectedGu];
  document.getElementById('dp-name').textContent = selectedGu;
  document.getElementById('dp-total').innerHTML = d.total.toLocaleString() + '<span> 톤</span>';
  document.getElementById('dp-subway').textContent = d.subway.toLocaleString() + ' 톤';
  document.getElementById('dp-building').textContent = d.building.toLocaleString() + ' 톤';
  document.getElementById('dp-cable').textContent = d.cable.toLocaleString() + ' 톤';
  document.getElementById('dp-elec').textContent = d.elec.toLocaleString() + ' 톤';

  const t = d.total || 1;
  document.getElementById('dp-bar-subway').style.width = (d.subway/t*100) + '%';
  document.getElementById('dp-bar-building').style.width = (d.building/t*100) + '%';
  document.getElementById('dp-bar-cable').style.width = (d.cable/t*100) + '%';
  document.getElementById('dp-bar-elec').style.width = (d.elec/t*100) + '%';

  // Mini doughnut
  if (detailChart) detailChart.destroy();
  const ctx = document.getElementById('detail-chart').getContext('2d');
  detailChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['지하철','건축물','통신구','전력구'],
      datasets: [{
        data: [d.subway, d.building, d.cable, d.elec],
        backgroundColor: ['#9933CC','#00ff9d','#00d4ff','#ff6b35'],
        borderWidth: 1, borderColor: '#060a14', hoverOffset: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#a8c5da', font: { size: 9 }, boxWidth: 8, padding: 6 } },
        tooltip: { backgroundColor: '#0c1626', borderColor: '#1a3050', borderWidth: 1, callbacks: {
          label: c => ` ${c.label}: ${c.parsed.toLocaleString()}톤`
        }}
      }
    }
  });
}

// =================== MODE ===================
function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMap();
  if (selectedGu) selectGu(selectedGu); // refresh detail
}

// =================== INIT ===================
renderMap();
</script>
